<svg width="800" height="175" viewBox="0 0 800 175" xmlns="http://www.w3.org/2000/svg">
<defs>
  <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
    <circle cx="11" cy="11" r="0.9" fill="#1c2333"/>
  </pattern>
</defs>

<!-- Background -->
<rect width="800" height="175" rx="13" fill="#0d1117"/>
<rect width="800" height="175" rx="13" fill="url(#dots)"/>
<rect x="0.8" y="0.8" width="798.4" height="173.4" rx="12.5" fill="none" stroke="#30363d" stroke-width="1.5"/>

<!-- Top-left terminal chrome -->
<rect x="18" y="14" width="200" height="22" rx="5" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
<circle cx="33" cy="25" r="4.5" fill="#ff5f56"/>
<circle cx="48" cy="25" r="4.5" fill="#ffbd2e"/>
<circle cx="63" cy="25" r="4.5" fill="#27c93f"/>
<text x="84" y="29.5" fill="#6e7681" font-family="'Courier New',monospace" font-size="10">pipeline.py</text>

<!-- Main title -->
<text x="400" y="28" text-anchor="middle" fill="#e6edf3" font-family="'Courier New',monospace" font-size="13" font-weight="bold" letter-spacing="5">DATA ENGINEERING</text>

<!-- Live pulse indicator -->
<circle cx="757" cy="22" r="5" fill="#27c93f" opacity="0.25">
  <animate attributeName="r" values="5;9;5" dur="1.8s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.25;0;0.25" dur="1.8s" repeatCount="indefinite"/>
</circle>
<circle cx="757" cy="22" r="4" fill="#27c93f"/>
<text x="769" y="26" fill="#27c93f" font-family="'Courier New',monospace" font-size="9" font-weight="bold">LIVE</text>

<!-- ══════════════════════════════════════════════
     SOURCE DATABASE (left)
     Center: (108, 88) | top y=65 | body h=46
     ══════════════════════════════════════════════ -->
<!-- Body fill -->
<rect x="68" y="65" width="80" height="46" fill="#0d1f35"/>
<!-- Bottom ellipse -->
<ellipse cx="108" cy="111" rx="40" ry="11" fill="#0d1f35" stroke="#2563eb" stroke-width="1.5"/>
<!-- Side lines -->
<line x1="68" y1="65" x2="68" y2="111" stroke="#2563eb" stroke-width="1.5"/>
<line x1="148" y1="65" x2="148" y2="111" stroke="#2563eb" stroke-width="1.5"/>
<!-- Inner data-row stripes -->
<line x1="68" y1="79" x2="148" y2="79" stroke="#2563eb" stroke-width="0.8" opacity="0.55"/>
<line x1="68" y1="91" x2="148" y2="91" stroke="#2563eb" stroke-width="0.8" opacity="0.35"/>
<line x1="68" y1="103" x2="148" y2="103" stroke="#2563eb" stroke-width="0.8" opacity="0.2"/>
<!-- Top ellipse (drawn last) -->
<ellipse cx="108" cy="65" rx="40" ry="11" fill="#0d1f35" stroke="#2563eb" stroke-width="1.5"/>
<!-- Subtle shine on top ellipse -->
<ellipse cx="105" cy="62" rx="22" ry="5" fill="none" stroke="#60a5fa" stroke-width="0.6" opacity="0.3"/>
<!-- Label -->
<text x="108" y="131" text-anchor="middle" fill="#60a5fa" font-family="'Courier New',monospace" font-size="10" font-weight="bold">SOURCES</text>

<!-- ══════════════════════════════════════════════
     PIPE 1: x 150→354 at y=88
     ══════════════════════════════════════════════ -->
<line x1="150" y1="88" x2="354" y2="88" stroke="#1c3050" stroke-width="3" stroke-linecap="round"/>
<!-- Tick marks along pipe -->
<line x1="200" y1="84" x2="200" y2="92" stroke="#1e3a5f" stroke-width="1" opacity="0.7"/>
<line x1="250" y1="84" x2="250" y2="92" stroke="#1e3a5f" stroke-width="1" opacity="0.7"/>
<line x1="300" y1="84" x2="300" y2="92" stroke="#1e3a5f" stroke-width="1" opacity="0.7"/>

<!-- Particles pipe 1 (blue) -->
<circle cx="0" cy="88" r="5" fill="#38bdf8" opacity="0">
  <animate attributeName="cx" from="152" to="352" dur="2.2s" begin="0s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.93;1" dur="2.2s" begin="0s" repeatCount="indefinite"/>
</circle>
<circle cx="0" cy="88" r="4.5" fill="#38bdf8" opacity="0">
  <animate attributeName="cx" from="152" to="352" dur="2.2s" begin="0.55s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.93;1" dur="2.2s" begin="0.55s" repeatCount="indefinite"/>
</circle>
<circle cx="0" cy="88" r="3.5" fill="#7dd3fc" opacity="0">
  <animate attributeName="cx" from="152" to="352" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.06;0.93;1" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
</circle>
<circle cx="0" cy="88" r="3" fill="#bae6fd" opacity="0">
  <animate attributeName="cx" from="152" to="352" dur="2.2s" begin="1.65s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.93;1" dur="2.2s" begin="1.65s" repeatCount="indefinite"/>
</circle>

<!-- ══════════════════════════════════════════════
     ETL HEXAGON (center)
     Center (390, 88), pointy-top, r=38
     Vertices: top(390,50) ur(423,69) lr(423,107) bot(390,126) ll(357,107) ul(357,69)
     ══════════════════════════════════════════════ -->
<!-- Outer spinning dashed ring -->
<circle cx="390" cy="88" r="47" fill="none" stroke="#6366f1" stroke-width="1.2" stroke-dasharray="13 8" opacity="0.45">
  <animateTransform attributeName="transform" type="rotate" from="0 390 88" to="360 390 88" dur="9s" repeatCount="indefinite"/>
</circle>
<!-- Second counter-spin ring -->
<circle cx="390" cy="88" r="53" fill="none" stroke="#818cf8" stroke-width="0.8" stroke-dasharray="5 18" opacity="0.25">
  <animateTransform attributeName="transform" type="rotate" from="360 390 88" to="0 390 88" dur="14s" repeatCount="indefinite"/>
</circle>
<!-- Hex fill -->
<polygon points="390,50 423,69 423,107 390,126 357,107 357,69" fill="#0f0f2e" stroke="#6366f1" stroke-width="2"/>
<!-- Inner hex glow outline -->
<polygon points="390,57 417,72 417,104 390,119 363,104 363,72" fill="none" stroke="#818cf8" stroke-width="0.8" opacity="0.5"/>
<!-- ETL label -->
<text x="390" y="84" text-anchor="middle" fill="#a5b4fc" font-family="'Courier New',monospace" font-size="13" font-weight="bold">ETL</text>
<text x="390" y="100" text-anchor="middle" fill="#6366f1" font-family="'Courier New',monospace" font-size="8" letter-spacing="2">PROCESS</text>
<!-- Label below hex -->
<text x="390" y="145" text-anchor="middle" fill="#818cf8" font-family="'Courier New',monospace" font-size="10" font-weight="bold">PIPELINE</text>

<!-- ══════════════════════════════════════════════
     PIPE 2: x 426→631 at y=88
     ══════════════════════════════════════════════ -->
<line x1="426" y1="88" x2="631" y2="88" stroke="#1a3025" stroke-width="3" stroke-linecap="round"/>
<line x1="476" y1="84" x2="476" y2="92" stroke="#1e3d2a" stroke-width="1" opacity="0.7"/>
<line x1="526" y1="84" x2="526" y2="92" stroke="#1e3d2a" stroke-width="1" opacity="0.7"/>
<line x1="576" y1="84" x2="576" y2="92" stroke="#1e3d2a" stroke-width="1" opacity="0.7"/>

<!-- Particles pipe 2 (green — transformed data) -->
<circle cx="0" cy="88" r="5" fill="#34d399" opacity="0">
  <animate attributeName="cx" from="428" to="629" dur="2.2s" begin="0s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.93;1" dur="2.2s" begin="0s" repeatCount="indefinite"/>
</circle>
<circle cx="0" cy="88" r="4.5" fill="#34d399" opacity="0">
  <animate attributeName="cx" from="428" to="629" dur="2.2s" begin="0.55s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.93;1" dur="2.2s" begin="0.55s" repeatCount="indefinite"/>
</circle>
<circle cx="0" cy="88" r="3.5" fill="#6ee7b7" opacity="0">
  <animate attributeName="cx" from="428" to="629" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.06;0.93;1" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
</circle>
<circle cx="0" cy="88" r="3" fill="#a7f3d0" opacity="0">
  <animate attributeName="cx" from="428" to="629" dur="2.2s" begin="1.65s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;0.6;0.6;0" keyTimes="0;0.06;0.93;1" dur="2.2s" begin="1.65s" repeatCount="indefinite"/>
</circle>

<!-- ══════════════════════════════════════════════
     DATA WAREHOUSE (right)
     Center: (685, 88) | top y=62 | body h=54 | rx=50, ry=14
     ══════════════════════════════════════════════ -->
<!-- Body fill -->
<rect x="635" y="62" width="100" height="54" fill="#0d2018"/>
<!-- Bottom ellipse -->
<ellipse cx="685" cy="116" rx="50" ry="14" fill="#0d2018" stroke="#10b981" stroke-width="1.5"/>
<!-- Side lines -->
<line x1="635" y1="62" x2="635" y2="116" stroke="#10b981" stroke-width="1.5"/>
<line x1="735" y1="62" x2="735" y2="116" stroke="#10b981" stroke-width="1.5"/>
<!-- Inner data-row stripes (more rows = more data!) -->
<line x1="635" y1="76" x2="735" y2="76" stroke="#10b981" stroke-width="0.8" opacity="0.55"/>
<line x1="635" y1="88" x2="735" y2="88" stroke="#10b981" stroke-width="0.8" opacity="0.4"/>
<line x1="635" y1="100" x2="735" y2="100" stroke="#10b981" stroke-width="0.8" opacity="0.25"/>
<line x1="635" y1="112" x2="735" y2="112" stroke="#10b981" stroke-width="0.8" opacity="0.12"/>
<!-- Top ellipse (drawn last) -->
<ellipse cx="685" cy="62" rx="50" ry="14" fill="#0d2018" stroke="#10b981" stroke-width="1.5"/>
<!-- Shine -->
<ellipse cx="681" cy="59" rx="28" ry="6" fill="none" stroke="#34d399" stroke-width="0.6" opacity="0.3"/>
<!-- Small pulsing star icon -->
<text x="685" y="101" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="11" opacity="0.7">
  ◈
  <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
</text>
<!-- Label -->
<text x="685" y="135" text-anchor="middle" fill="#34d399" font-family="'Courier New',monospace" font-size="10" font-weight="bold">DATA WAREHOUSE</text>

<!-- ══════════════════════════════════════════════
     BOTTOM TECH STACK
     ══════════════════════════════════════════════ -->
<line x1="40" y1="155" x2="760" y2="155" stroke="#21262d" stroke-width="0.8"/>
<text x="400" y="168" text-anchor="middle" fill="#3d444d" font-family="'Courier New',monospace" font-size="8.5" letter-spacing="0.8">Spark · Kafka · dbt · Airflow · Snowflake · Azure Synapse · Python · SQL</text>

</svg>
